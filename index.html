<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Profile</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: white;
    }

    header {
        background: #1d4ed8;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 850px;
        margin: auto;
        padding: 15px;
    }

    .card {
        background: #111827;
        padding: 18px;
        border-radius: 14px;
        margin-top: 15px;
    }

    .wallet {
        background: #0ea5e9;
        padding: 14px;
        border-radius: 10px;
        word-break: break-all;
        font-weight: bold;
        font-size: 14px;
    }

    button {
        margin-top: 10px;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 8px;
        background: #22c55e;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #16a34a;
    }

    #qrcode {
        margin-top: 15px;
        background: white;
        padding: 10px;
        display: inline-block;
        border-radius: 10px;
    }

    .contact {
        background: #1f2937;
    }

    footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #94a3b8;
    }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #22c55e;
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
        display: none;
    }
</style>
</head>

<body>

<header>
    <h1>Crypto Profile</h1>
    <p>Wallet & contact information</p>
</header>

<div class="container">

    <div class="card">
        <h2>Bitcoin Wallet</h2>

        <div class="wallet" id="wallet">
            bc1qrc4dz7k6zlth9nn4mx82qjnmyg6s3tty4up0mh
        </div>

        <button onclick="copyWallet()">Copy Wallet</button>

        <div id="qrcode"></div>
    </div>

    <div class="card contact">
        <h2>Contact</h2>
        <p>Telegram: @Ethervision35</p>
    </div>

</div>

<div class="toast" id="toast">Copied!</div>

<footer>
    © 2026 Crypto Profile Page
</footer>

<script>
function copyWallet() {
    const wallet = document.getElementById("wallet").innerText;
    navigator.clipboard.writeText(wallet);

    const toast = document.getElementById("toast");
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 1500);
}

const wallet = document.getElementById("wallet").innerText;
QRCode.toCanvas(document.getElementById("qrcode"), wallet);
</script>

</body>
</html>
