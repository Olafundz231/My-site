<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Payment Info</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: white;
    }

    header {
        background: #1d4ed8;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    .card {
        background: #111827;
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
    }

    .wallet {
        background: #0ea5e9;
        padding: 15px;
        border-radius: 10px;
        word-break: break-all;
        font-weight: bold;
    }

    button {
        margin-top: 10px;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #22c55e;
        color: white;
        font-weight: bold;
    }

    .contact {
        background: #1f2937;
    }

    .warning {
        background: #7f1d1d;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        color: #fecaca;
    }

    footer {
        text-align: center;
        margin-top: 30px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>

<body>

<header>
    <h1>Crypto Payment Info</h1>
    <p>Wallet details and contact</p>
</header>

<div class="container">

    <div class="card">
        <h2>Wallet Address (BTC)</h2>

        <div class="wallet" id="wallet">
            bc1qrc4dz7k6zlth9nn4mx82qjnmyg6s3tty4up0mh
        </div>

        <button onclick="copyWallet()">Copy Wallet</button>
    </div>

    <div class="card contact">
        <h2>Contact</h2>
        <p>Telegram: @Ethervision35</p>
    </div>

    <div class="card">
        <h2>Notice</h2>

        <div class="warning">
            Always double-check wallet addresses before sending any crypto.
            Transactions on blockchain are irreversible.
        </div>
    </div>

    <footer>
        © 2026 Crypto Info Page
    </footer>

</div>

<script>
function copyWallet() {
    const text = document.getElementById("wallet").innerText;
    navigator.clipboard.writeText(text);
    alert("Wallet copied!");
}
</script>

</body>
</html>
