<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #1e3a8a;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

.plans {
    display: grid;
    gap: 15px;
}

.plan {
    background: #334155;
    padding: 15px;
    border-radius: 10px;
}

.wallet {
    background: #0ea5e9;
    padding: 15px;
    border-radius: 10px;
    word-break: break-all;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #22c55e;
    color: white;
    font-weight: bold;
    width: 100%;
}

button:hover {
    background: #16a34a;
}

footer {
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>Investment Dashboard</h1>
    <p>Track plans and payment details</p>
</header>

<div class="container">

    <div class="card">
        <h2>Investment Plans</h2>

        <div class="plans">
            <div class="plan">
                <h3>Starter Plan</h3>
                <p>$100 - 7 Days</p>
            </div>

            <div class="plan">
                <h3>Standard Plan</h3>
                <p>$500 - 14 Days</p>
            </div>

            <div class="plan">
                <h3>Premium Plan</h3>
                <p>$1000+ - 30 Days</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Wallet Address</h2>

        <div class="wallet" id="wallet">
bc1qrc4dz7k6zlth9nn4mx82qjnmyg6s3tty4up0mh
        </div>

        <button onclick="copyWallet()">Copy Wallet</button>
        <button onclick="goToThankYou()">Done</button>
    </div>

</div>

<footer>
© 2026 Investment Dashboard
</footer>

<script>
function copyWallet() {
    const wallet = document.getElementById("wallet").innerText;
    navigator.clipboard.writeText(wallet)
        .then(() => alert("Wallet copied!"))
        .catch(() => alert("Copy failed"));
}

function goToThankYou() {
    window.location.href = "thankyou.html";
}
</script>

</body>
</html>
