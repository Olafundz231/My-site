<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Status</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #111a2e;
    padding: 30px;
    border-radius: 14px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* Animated checkmark */
.checkmark {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: block;
    stroke-width: 3;
    stroke: #22c55e;
    stroke-miterlimit: 10;
    margin: 0 auto 20px auto;
    box-shadow: inset 0px 0px 0px #22c55e;
    animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
}

.checkmark__circle {
    stroke-dasharray: 166;
    stroke-dashoffset: 166;
    stroke-width: 3;
    stroke-miterlimit: 10;
    stroke: #22c55e;
    fill: none;
    animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
}

.checkmark__check {
    transform-origin: 50% 50%;
    stroke-dasharray: 48;
    stroke-dashoffset: 48;
    animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
}

@keyframes stroke {
    100% { stroke-dashoffset: 0; }
}

@keyframes scale {
    0%, 100% { transform: none; }
    50% { transform: scale3d(1.1, 1.1, 1); }
}

@keyframes fill {
    100% { box-shadow: inset 0px 0px 0px 40px #22c55e; }
}

h1 {
    margin: 10px 0;
    color: #22c55e;
    font-size: 22px;
}

p {
    color: #cbd5e1;
    font-size: 14px;
    line-height: 1.5;
}

.status {
    margin-top: 15px;
    padding: 10px;
    background: #1f2a44;
    border-radius: 8px;
    font-size: 13px;
}

.ref {
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="card">

    <!-- CHECKMARK ICON -->
    <svg class="checkmark" viewBox="0 0 52 52">
        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark__check" fill="none" d="M14 27 l7 7 l16 -16"/>
    </svg>

    <h1>Transaction Submitted</h1>

    <p>Your request has been received and is being processed.</p>

    <div class="status">
        Status: Pending Confirmation
    </div>

    <div class="ref">
        Reference ID: <span id="ref"></span>
    </div>

    <p style="margin-top:15px;">
        We will notify you once your payment is confirmed.
    </p>

</div>

<script>
function generateRef() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let ref = "TX-";
    for (let i = 0; i < 10; i++) {
        ref += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return ref;
}

document.getElementById("ref").innerText = generateRef();
</script>

</body>
</html>
