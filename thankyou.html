<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Status</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #111a2e;
    padding: 30px;
    border-radius: 14px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

h1 {
    margin: 10px 0;
    color: #22c55e;
    font-size: 22px;
}

.status {
    margin-top: 15px;
    padding: 10px;
    background: #1f2a44;
    border-radius: 8px;
    font-size: 13px;
}

.confirm {
    margin-top: 15px;
    font-size: 14px;
    color: #cbd5e1;
}

.ref {
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
}

/* blinking animation */
.dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-left: 4px;
    background: #22c55e;
    border-radius: 50%;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
}
</style>
</head>

<body>

<div class="card">

    <h1>Transaction Submitted</h1>

    <div class="status" id="status">
        Status: Processing...
    </div>

    <div class="confirm" id="confirm">
        Network Confirmations: 0/3
    </div>

    <div class="ref">
        Reference ID: <span id="ref"></span>
    </div>

</div>

<!-- SOUND -->
<audio id="successSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
function generateRef() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let ref = "TX-";
    for (let i = 0; i < 10; i++) {
        ref += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return ref;
}

document.getElementById("ref").innerText = generateRef();

let confirmCount = 0;

function updateConfirmations() {
    if (confirmCount < 3) {
        confirmCount++;
        document.getElementById("confirm").innerText =
            "Network Confirmations: " + confirmCount + "/3";
    }

    if (confirmCount === 3) {
        document.getElementById("status").innerHTML =
            "Status: Completed <span class='dot'></span>";

        document.getElementById("confirm").innerText =
            "Transaction fully confirmed";

        // play sound ONLY when completed
        document.getElementById("successSound").play();
        clearInterval(timer);
    }
}

// simulate confirmations every 2 seconds
let timer = setInterval(updateConfirmations, 2000);
</script>

</body>
</html>
